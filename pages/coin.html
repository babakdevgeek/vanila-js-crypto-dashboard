<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="../js/run-before-css/theme.js"></script>
    <link rel="stylesheet" href="../css/index.css" />
    <script type="module" src="../js/pages/coin.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
      integrity="sha512-XcIsjKMcuVe0Ucj/xgIXQnytNwBttJbNjltBV18IOnru2lDPe9KRRyvCXw6Y5H415vbBLRm8+q6fmLUU7DfO6Q=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>مشخصات ارز</title>
  </head>
  <body>
    <header>
      <!--Global bar-->
      <div class="global">
        <div class="container">
          <p id="count-coins">ارزها: <b>N/A</b></p>
          <p id="count-exchanges">صرافی ها: <b>N/A</b></p>
          <p id="market-cap">مارکت کپ: <b>N/A</b></p>
          <p id="market-change">تغییرات بازار: <b>N/A</b></p>
        </div>
      </div>
      <!--Navbar-->
      <div id="container-navEl">
        <nav>
          <div class="nav-right">
            <a id="link-logo" href="../index.html">لوگو.</a>

            <ul>
              <li id="li-home"><a href="../index.html">صفحه اصلی</a></li>
              <li id="li-chart"><a href="./chart.html">چارت</a></li>
              <li id="li-about">
                <a href="./about.html">درباره ی وبسایت</a>
              </li>
            </ul>
          </div>

          <div class="nav-left">
            <form action="search()">
              <input type="text" placeholder="btc eth sol etc.." />
              <button class="action-button" type="submit">
                <i class="ri-search-line"></i>
              </button>
              <div class="search-result"></div>
            </form>

            <!--Sun class is: ri-sun-line-->

            <div class="nav-left-wrapper-buttons">
              <button class="action-button" id="button-theme">
                <i class="ri-moon-cloudy-line"></i>
              </button>
              <button class="action-button" id="button-menu-bar">
                <i class="ri-menu-line"></i>
              </button>
            </div>
          </div>

          <!--Menu content on phone screens-->
          <div id="phone-nav-menu">
            <button class="action-button" id="phone-button-back-menu">
              <i class="ri-arrow-go-back-line"></i>
            </button>
            <ul>
              <li><a href="../index.html">صفحه اصلی</a></li>
              <li><a href="./chart.html">چارت</a></li>
              <li><a href="./about.html">درباره ی ما</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <main>
      <div class="coin">
        <div class="coin-info skeleton"></div>

        <div class="coin-chart skeleton">
          <div class="coin-chart-top">
            <h2>نمای یکماهه ی <span></span></h2>
            <button class="btn">چارت کندلی</button>
          </div>
          <div class="coin-chart-container"></div>
        </div>

        <div class="coin-description skeleton">
          <div class="accordion">
            <div class="accordion-title">
              <span><b></b></span>
              <span><i class="ri-arrow-down-wide-line"></i></span>
            </div>
            <div class="accordion-body">
              <p></p>
            </div>
          </div>
        </div>

        <div class="coin-additional-info skeleton"></div>
      </div>
    </main>

    <footer>
      <p>© تمامی حقوق محفوظ است</p>
      <div class="social">
        <a href="https://github.com/babakdevgeek"
          ><i class="ri-github-line"></i
        ></a>
        <a href="https://t.me/truerex"><i class="ri-telegram-2-line"></i></a>
      </div>
    </footer>
  </body>
</html>
